# Render blueprint — one web service that runs the API and serves the React build.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: daily-devotional
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # TiDB Cloud Serverless uses TLS with a public CA (rejectUnauthorized stays true).
      - key: DB_SSL
        value: "true"
      - key: DB_PORT
        value: "4000"
      # JWT secret is generated once by Render.
      - key: JWT_SECRET
        generateValue: true
      # Secrets — fill these in the Render dashboard (they are not committed).
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
